<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Love Forever</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; }
    body {
      background: #0d0015;
      height: 100vh;
      margin: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    }

    #bg-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    #ui {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      z-index: 1;
    }

    #ui .love {
      position: absolute;
      top: -225px;
      left: -225px;
      --i: 1;
    }
    #ui .love:last-child .love_word {
      color: #ea80b0;
      font-size: clamp(0.9rem, 3.5vw, 1.4rem);
      text-shadow: 0 0 10px #fff;
    }
    #ui .love_word {
      color: #ea80b0;
      font-size: clamp(0.9rem, 3.5vw, 1.4rem);
      transform: translateY(-100%) rotateZ(-30deg);
      text-shadow: 0 0 10px #fff;
      letter-spacing: 2px;
      white-space: nowrap;
    }
    #ui .love_horizontal {
      animation: horizontal 10000ms infinite alternate ease-in-out;
      animation-delay: calc(var(--i) * -300ms);
    }
    #ui .love_vertical {
      animation: vertical 20000ms infinite linear;
      animation-delay: calc(var(--i) * -300ms);
    }

    @keyframes horizontal {
      from { transform: translateX(0px); }
      to   { transform: translateX(450px); }
    }
    @keyframes vertical {
      0%   { transform: translateY(180px); }
      10%  { transform: translateY(45px); }
      15%  { transform: translateY(4.5px); }
      18%  { transform: translateY(0px); }
      20%  { transform: translateY(4.5px); }
      22%  { transform: translateY(34.61538px); }
      24%  { transform: translateY(64.28571px); }
      25%  { transform: translateY(112.5px); }
      26%  { transform: translateY(64.28571px); }
      28%  { transform: translateY(34.61538px); }
      30%  { transform: translateY(4.5px); }
      32%  { transform: translateY(0px); }
      35%  { transform: translateY(4.5px); }
      40%  { transform: translateY(45px); }
      50%  { transform: translateY(180px); }
      71%  { transform: translateY(428.57143px); }
      72.5%{ transform: translateY(441.17647px); }
      75%  { transform: translateY(450px); }
      77.5%{ transform: translateY(441.17647px); }
      79%  { transform: translateY(428.57143px); }
      100% { transform: translateY(180px); }
    }

    #play-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 10;
      background: rgba(234,128,176,0.18);
      border: 1.5px solid #ea80b0;
      color: #ea80b0;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
      transition: background 0.2s, transform 0.15s;
      box-shadow: 0 0 16px rgba(234,128,176,0.25);
    }
    #play-btn:hover {
      background: rgba(234,128,176,0.32);
      transform: scale(1.1);
    }
  </style>
</head>
<body>

<audio id="bg-audio" src="https://files.catbox.moe/kb3jpf.mp3" loop preload="auto"></audio>
<button id="play-btn" title="Play / Pause musik">▶</button>

<canvas id="bg-canvas"></canvas>
<div id="ui"></div>

<script>
  /* ── Audio autoplay agresif ── */
  const audio = document.getElementById('bg-audio');
  const btn   = document.getElementById('play-btn');
  let played   = false;

  function startAudio() {
    if (played) return;
    // Unlock AudioContext dulu (wajib di browser modern)
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (AudioCtx) {
      const ctx = new AudioCtx();
      // Buat silence node untuk membuka kunci kebijakan autoplay
      const buf = ctx.createBuffer(1, 1, 22050);
      const src = ctx.createBufferSource();
      src.buffer = buf;
      src.connect(ctx.destination);
      src.start(0);
      ctx.resume();
    }
    audio.play().then(() => {
      btn.textContent = '⏸';
      played = true;
    }).catch(() => {
      btn.textContent = '▶';
    });
  }

  // Coba langsung saat halaman load
  window.addEventListener('load', () => {
    startAudio();
  });

  // Tangkap interaksi pertama apapun (gerak mouse, sentuh, scroll, tekan tombol)
  // agar audio langsung menyala tanpa perlu klik tombol khusus
  const firstInteractionEvents = ['mousemove', 'mousedown', 'touchstart', 'touchmove', 'keydown', 'scroll', 'pointerdown'];
  function onFirstInteraction() {
    startAudio();
    firstInteractionEvents.forEach(evt => document.removeEventListener(evt, onFirstInteraction));
  }
  firstInteractionEvents.forEach(evt => document.addEventListener(evt, onFirstInteraction, { passive: true }));

  // Tombol toggle play/pause manual
  btn.addEventListener('click', () => {
    if (audio.paused) {
      audio.play();
      btn.textContent = '⏸';
      played = true;
    } else {
      audio.pause();
      btn.textContent = '▶';
    }
  });

  /* ── Canvas background ── */
  const canvas = document.getElementById('bg-canvas');
  const ctx2 = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const stars = Array.from({length: 160}, () => ({
    x: Math.random(),
    y: Math.random(),
    r: Math.random() * 1.4 + 0.3,
    a: Math.random(),
    speed: Math.random() * 0.008 + 0.002,
    phase: Math.random() * Math.PI * 2
  }));

  const orbs = Array.from({length: 6}, (_, i) => ({
    x: Math.random(),
    y: Math.random(),
    r: 80 + Math.random() * 120,
    hue: [320, 280, 260, 300, 340, 200][i],
    speed: (Math.random() * 0.0003 + 0.0001) * (Math.random() < 0.5 ? 1 : -1),
    phase: Math.random() * Math.PI * 2,
    opacity: 0.10 + Math.random() * 0.12
  }));

  let t = 0;
  function draw() {
    const W = canvas.width, H = canvas.height;
    t += 0.008;

    ctx2.fillStyle = '#0d0015';
    ctx2.fillRect(0, 0, W, H);

    const grad = ctx2.createRadialGradient(W*0.5, H*0.45, 0, W*0.5, H*0.45, W*0.75);
    grad.addColorStop(0,   'rgba(120,20,80,0.28)');
    grad.addColorStop(0.4, 'rgba(60,10,100,0.18)');
    grad.addColorStop(1,   'rgba(0,0,0,0)');
    ctx2.fillStyle = grad;
    ctx2.fillRect(0, 0, W, H);

    orbs.forEach(o => {
      o.phase += o.speed;
      const ox = (o.x + Math.sin(o.phase) * 0.12) * W;
      const oy = (o.y + Math.cos(o.phase * 0.7) * 0.10) * H;
      const g2 = ctx2.createRadialGradient(ox, oy, 0, ox, oy, o.r);
      g2.addColorStop(0,   `hsla(${o.hue},70%,60%,${o.opacity})`);
      g2.addColorStop(0.5, `hsla(${o.hue},60%,40%,${o.opacity * 0.4})`);
      g2.addColorStop(1,   'rgba(0,0,0,0)');
      ctx2.fillStyle = g2;
      ctx2.fillRect(0, 0, W, H);
    });

    stars.forEach(s => {
      s.phase += s.speed;
      const alpha = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(s.phase));
      ctx2.beginPath();
      ctx2.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
      ctx2.fillStyle = `rgba(255,220,240,${alpha})`;
      ctx2.fill();
    });

    const band = ctx2.createLinearGradient(0, H*0.3, 0, H*0.7);
    const pulse = 0.04 + 0.02 * Math.sin(t * 0.5);
    band.addColorStop(0,   'rgba(0,0,0,0)');
    band.addColorStop(0.5, `rgba(180,50,120,${pulse})`);
    band.addColorStop(1,   'rgba(0,0,0,0)');
    ctx2.fillStyle = band;
    ctx2.fillRect(0, 0, W, H);

    requestAnimationFrame(draw);
  }
  draw();

  /* ── Floating words ── */
  const N = 100;
  const ui = document.getElementById('ui');

  for (let i = 1; i <= N; i++) {
    const love = document.createElement('div');
    love.className = 'love';
    love.style.setProperty('--i', i);

    const h = document.createElement('div');
    h.className = 'love_horizontal';

    const v = document.createElement('div');
    v.className = 'love_vertical';

    const word = document.createElement('div');
    word.className = 'love_word';
    word.textContent = 'Semangat ya Anjali';

    v.appendChild(word);
    h.appendChild(v);
    love.appendChild(h);
    ui.appendChild(love);
  }
</script>
</body>
</html>
